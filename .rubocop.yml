AllCops:
  NewCops: enable
  Exclude:
    - 'scratch/*.rb'

Style/RedundantException:
  Enabled: false

Style/ImplicitRuntimeError:
  Enabled: true

Style/NumericPredicate:
  Enabled: false

Style/OptionalBooleanParameter:
  Enabled: false

Style/AccessModifierDeclarations:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/QuotedSymbols:
  Enabled: false

Style/ConditionalAssignment:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false

Style/TernaryParentheses:
  Enabled: false

Style/SymbolArray:
  Enabled: false

Style/SymbolProc:
  Enabled: false

Style/PreferredHashMethods:
  Enabled: false

Style/GuardClause:
  Enabled: false

Style/NumericLiterals:
  Enabled: false

Style/CommentAnnotation:
  Enabled: false

Style/Documentation:
  Enabled: false

Lint/NestedMethodDefinition:
  Enabled: false

Lint/AmbiguousOperatorPrecedence:
  Enabled: false


Lint/BinaryOperatorWithIdenticalOperands:
  Exclude:
    - 'tests/test_midinote.rb'
    - 'tests/test_interval.rb'


Layout:
  Enabled: false

Metrics:
  Enabled: false

Naming:
  Enabled: false
