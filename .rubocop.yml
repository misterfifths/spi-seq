AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  Exclude:
    - 'scratch/*.rb'
    - 'examples/*.rb'
    - 'yard/*.rb'

# Allow global `include`
Style/MixinUsage:
  Exclude:
    - 'core.rb'

# Allow `module X; module Y; ...`. Look, I just refuse to start with like 8
# spaces of indentation by default.
Style/TrailingBodyOnModule:
  Enabled: false

Style/RedundantException:
  Enabled: false

Style/ImplicitRuntimeError:
  Enabled: true

Style/NumericPredicate:
  Enabled: false

Style/OptionalBooleanParameter:
  Enabled: false

Style/AccessModifierDeclarations:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/ConditionalAssignment:
  Enabled: false

Style/TernaryParentheses:
  EnforcedStyle: require_parentheses_when_complex

Style/SymbolArray:
  Enabled: false

Style/SymbolProc:
  Enabled: false

Style/PreferredHashMethods:
  EnforcedStyle: verbose

Style/GuardClause:
  Enabled: false

Style/NumericLiterals:
  Enabled: false

Style/CommentAnnotation:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/OneClassPerFile:
  Enabled: false

Lint/AmbiguousOperatorPrecedence:
  Enabled: false

Lint/BinaryOperatorWithIdenticalOperands:
  Exclude:
    - 'test/test_midinote.rb'
    - 'test/test_interval.rb'
    - 'test/test_notelength.rb'

Layout:
  Enabled: false

Metrics:
  Enabled: false

Naming:
  Enabled: false
